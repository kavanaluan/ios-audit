<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wild Nomads – 官方支持</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fa;
      color: #333;
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, #2c5f8a 0%, #3a9c6e 100%);
      color: #fff;
      padding: 80px 24px 72px;
      text-align: center;
    }
    .hero-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.18);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }
    .hero p {
      font-size: 1.1rem;
      opacity: 0.88;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Cards section ── */
    .section {
      max-width: 800px;
      margin: 0 auto;
      padding: 56px 24px;
    }
    .section-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 28px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.11);
    }
    .card-icon {
      font-size: 2.2rem;
      margin-bottom: 14px;
    }
    .card h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: #1a1a2e;
    }
    .card p {
      font-size: 0.92rem;
      color: #666;
      line-height: 1.6;
    }
    .card a {
      color: #3a9c6e;
      text-decoration: none;
      font-weight: 500;
    }
    .card a:hover { text-decoration: underline; }

    /* ── Contact box ── */
    .contact-box {
      background: linear-gradient(135deg, #eef6f2 0%, #e8f1f8 100%);
      border-radius: 16px;
      padding: 36px 32px;
      text-align: center;
      margin-bottom: 48px;
    }
    .contact-box h2 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 10px;
      color: #1a1a2e;
    }
    .contact-box p {
      color: #555;
      margin-bottom: 20px;
      font-size: 0.97rem;
    }
    .btn-email {
      display: inline-block;
      background: linear-gradient(135deg, #2c5f8a, #3a9c6e);
      color: #fff;
      padding: 12px 32px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.97rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-email:hover { opacity: 0.88; transform: scale(1.03); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid #e4e8ed;
      margin: 0 0 48px;
    }

    /* ── Links bar ── */
    .links-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }
    .links-bar a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #3a9c6e;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 8px 18px;
      border: 1.5px solid #3a9c6e;
      border-radius: 999px;
      transition: background 0.18s, color 0.18s;
    }
    .links-bar a:hover {
      background: #3a9c6e;
      color: #fff;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 24px;
      font-size: 0.85rem;
      color: #aaa;
      border-top: 1px solid #e4e8ed;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-icon">🌿</div>
    <h1>Wild Nomads</h1>
    <p>官方支持中心 · Official Support</p>
  </div>

  <div class="section">

    <p class="section-title">我们能为您做什么？</p>

    <div class="cards">
      <div class="card">
        <div class="card-icon">💬</div>
        <h3>技术支持</h3>
        <p>遇到使用问题？我们的团队随时为您解答。</p>
      </div>
      <div class="card">
        <div class="card-icon">🐛</div>
        <h3>反馈 Bug</h3>
        <p>发现问题请告知我们，帮助改善每一位用户的体验。</p>
      </div>
      <div class="card">
        <div class="card-icon">💡</div>
        <h3>功能建议</h3>
        <p>有好的想法？我们非常欢迎您的创意与建议。</p>
      </div>
    </div>

    <div class="contact-box">
      <h2>联系我们</h2>
      <p>如需技术支持或任何咨询，请发送邮件至<br /><strong>support@wildnomads.cn</strong></p>
      <a class="btn-email" href="mailto:support@wildnomads.cn">发送邮件</a>
    </div>

    <hr class="divider" />

    <div class="links-bar">
      <a href="./privacy.html">🔒 隐私政策 (Privacy Policy)</a>
      <a href="https://github.com/kavanaluan/ios-audit" target="_blank" rel="noopener">⭐ 在 GitHub 上查看</a>
    </div>

  </div>

  <footer>
    &copy; 2026 Wild Nomads · All rights reserved
  </footer>

</body>
</html>
